<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>COBOT Corporate Subpage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="subpage.css">
</head>
<body>
  <div id="global-header"></div>
  <main>
    <div class="page-header">
       <div class="container">
         <h1 id="dynamic-title">공시/공고</h1>
         <div class="breadcrumb">경로: <a href="index.html">홈</a> > <span id="dynamic-breadcrumb">상세 내용</span></div>
       </div>
    </div>
    <section class="subpage-section">
      <div class="container">
        <div class="subpage-content adaptive-grid fade-up-element">
          <div class="grid-text-area">
            <h2 id="dynamic-section" style="color: #fff; margin-bottom: 20px;">첨단 비전 및 제품 정보</h2>
            <p id="dynamic-desc" style="color: var(--text-base); line-height: 1.8;">이 페이지는 COBOT의 기술 인프라를 소개합니다. 좌측 메뉴나 상단의 항목을 통해 들어오셨습니다.</p>
          </div>
          <div class="grid-media-area">
            <div class="media-placeholder focusable" tabindex="0">
              <span class="play-icon">▶</span>
              <p>3D 인포그래픽 영역</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="global-hashtags"></div>
  <div id="global-footer"></div>
  
  <script src="components.js" charset="utf-8"></script>
  <script src="main.js" defer></script>
</body>
</html>
